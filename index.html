<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeScript シューティングゲーム</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: "Segoe UI", "Noto Sans JP", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 16px;
      }

      h1.app-title {
        font-size: 1.4rem;
        margin-bottom: 12px;
        letter-spacing: 0.05em;
        color: #00bfff;
      }

      /* ナビゲーション */
      nav {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .nav-btn {
        padding: 8px 24px;
        border: 2px solid #00bfff;
        background: transparent;
        color: #00bfff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s, color 0.2s;
      }

      .nav-btn.active,
      .nav-btn:hover {
        background: #00bfff;
        color: #000;
      }

      /* キャンバス */
      #game-canvas {
        border: 2px solid #00bfff;
        border-radius: 4px;
      }

      /* プロフィールページ */
      #profile-container {
        width: 480px;
        max-width: 100%;
      }

      .profile-page {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 24px;
      }

      .profile-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .profile-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #00bfff;
        color: #000;
        font-size: 1.8rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .profile-name {
        font-size: 1.5rem;
        color: #00bfff;
      }

      .profile-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        margin-bottom: 24px;
      }

      .profile-stats dt {
        font-size: 0.85rem;
        color: #aaa;
        align-self: end;
      }

      .profile-stats dd {
        font-size: 1.3rem;
        font-weight: bold;
        color: #e0e0e0;
      }

      .profile-reset-btn {
        display: block;
        width: 100%;
        padding: 10px;
        border: 2px solid #e74c3c;
        background: transparent;
        color: #e74c3c;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.2s, color 0.2s;
      }

      .profile-reset-btn:hover {
        background: #e74c3c;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h1 class="app-title">🚀 TypeScript シューティングゲーム</h1>
    <div id="app"></div>

    <script type="module">
      // TypeScript がトランスパイル済みの場合は dist/app.js を参照
      // 開発時は直接読み込み
      import("./dist/app.js")
        .then(({ initApp }) => {
          const root = document.getElementById("app");
          if (root) initApp(root);
        })
        .catch(() => {
          document.getElementById("app").textContent =
            "ビルドが必要です: npm run build を実行してください。";
        });
    </script>
  </body>
</html>
